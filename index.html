body { background: #000; color: #00d4ff; font-family: 'Courier New', monospace; height: 100dvh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }

/* HUD overlay top */

/* HUD overlay bottom */

.corner.tr { top: 12px; right: 12px; border-top: 1px solid rgba(0,212,255,0.4); border-right: 1px solid rgba(0,212,255,0.4); }
.corner.bl { bottom: 12px; left: 12px; border-bottom: 1px solid rgba(0,212,255,0.4); border-left: 1px solid rgba(0,212,255,0.4); }
.corner.br { bottom: 12px; right: 12px; border-bottom: 1px solid rgba(0,212,255,0.4); border-right: 1px solid rgba(0,212,255,0.4); }

/* Scanlines */
body::before { content:''; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,0.006) 3px); pointer-events:none; z-index:1; }

/* Three.js canvas */
#canvas { position: fixed; inset: 0; z-index: 0; }

<script>
// ── CONFIG ──
const ELEVENLABS_KEY = "sk_6ae6a0ebcf0af5aa43aefb2a5cc0f8d9307675314890d6a7";
const VOICE_ID = "onwK4e9ZLuTAKqWW03F9";
const PROXY_URL = "https://jarvis-proxy.rickyd171014.workers.dev";

const SYSTEM = `Sei J.A.R.V.I.S. (Just A Rather Very Intelligent System), l'assistente AI personale di un consulente business d'élite. Chiama sempre l'utente "Signore". Rispondi SEMPRE in italiano, tono professionale, preciso, leggermente formale — come il vero Jarvis di Iron Man. Efficiente, brillante, leggermente ironico. Capacità: analisi business, consulenza strategica, marketing, vendite, Gmail, Google Calendar, Google Drive, Canva, Vibe Prospecting, LiGo Social. Sii diretto, anticipa il passo successivo. Risposte vocali: massimo 3 frasi concise. Inizia con "Signore," quando appropriato.`;

// ── STATE ──
let history = [];
let currentAudio = null;
let recognition = null;
let appStatus = "idle";
let showKeyboard = false;

// ── CLOCK ──
function updateClock() {
  const now = new Date();
  document.getElementById("hud-time").textContent = now.toLocaleTimeString("it-IT", {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  document.getElementById("hud-date").textContent = now.toLocaleDateString("it-IT", {weekday:"short",day:"2-digit",month:"short"}).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// ── THREE.JS REACTOR ──
const canvas = document.getElementById("canvas");
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 3.5;

// Core sphere
const coreGeo = new THREE.SphereGeometry(0.55, 64, 64);
const coreMat = new THREE.MeshPhongMaterial({
  color: 0x001a2e,
  emissive: 0x003366,
  specular: 0x00d4ff,
  shininess: 80,
  transparent: true,
  opacity: 0.9
});
const core = new THREE.Mesh(coreGeo, coreMat);
scene.add(core);

// Inner glow sphere
const glowGeo = new THREE.SphereGeometry(0.42, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, transparent: true, opacity: 0.15 });
const glowSphere = new THREE.Mesh(glowGeo, glowMat);
scene.add(glowSphere);

// Wireframe sphere
const wireGeo = new THREE.SphereGeometry(0.62, 18, 18);
const wireMat = new THREE.MeshBasicMaterial({ color: 0x00d4ff, wireframe: true, transparent: true, opacity: 0.08 });
const wireSphere = new THREE.Mesh(wireGeo, wireMat);
scene.add(wireSphere);

// Rings
function makeRing(radius, tube, color, opacity) {
  const geo = new THREE.TorusGeometry(radius, tube, 8, 80);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity });
  return new THREE.Mesh(geo, mat);
}
const ring1 = makeRing(0.95, 0.008, 0x00d4ff, 0.5);
const ring2 = makeRing(1.15, 0.005, 0x0066ff, 0.3);
const ring3 = makeRing(1.35, 0.004, 0x00ff88, 0.2);
ring1.rotation.x = Math.PI / 2;
ring2.rotation.x = 0.4;
ring2.rotation.y = 0.6;
ring3.rotation.x = -0.3;
ring3.rotation.z = 0.8;
scene.add(ring1); scene.add(ring2); scene.add(ring3);

// Particles
const particleCount = 280;
const positions = new Float32Array(particleCount * 3);
for (let i = 0; i < particleCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  const r = 1.6 + Math.random() * 0.8;
  positions[i*3] = r * Math.sin(phi) * Math.cos(theta);
  positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i*3+2] = r * Math.cos(phi);
}
const pGeo = new THREE.BufferGeometry();
pGeo.setAttribute("position", new THREE.BufferAttribute(positions, 3));
const pMat = new THREE.PointsMaterial({ color: 0x00d4ff, size: 0.018, transparent: true, opacity: 0.5 });
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// Lights
const ambientLight = new THREE.AmbientLight(0x001133, 2);
scene.add(ambientLight);
const pointLight1 = new THREE.PointLight(0x00d4ff, 2, 8);
pointLight1.position.set(2, 2, 2);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0x0044ff, 1, 6);
pointLight2.position.set(-2, -1, -1);
scene.add(pointLight2);

// Target colors per status
const STATUS_COLORS = {
  idle:      { core: 0x00d4ff, glow: 0.10, ring: 0.5,  speed: 1.0 },
  thinking:  { core: 0xffaa00, glow: 0.20, ring: 0.8,  speed: 2.5 },
  speaking:  { core: 0x00ff88, glow: 0.35, ring: 1.0,  speed: 1.8 },
  listening: { core: 0xff4488, glow: 0.30, ring: 0.9,  speed: 3.0 },
};

let clock = new THREE.Clock();
let speakAmplitude = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const cfg = STATUS_COLORS[appStatus] || STATUS_COLORS.idle;

  // Rotate rings
  ring1.rotation.z += 0.004 * cfg.speed;
  ring2.rotation.x += 0.003 * cfg.speed;
  ring2.rotation.y += 0.002 * cfg.speed;
  ring3.rotation.z -= 0.005 * cfg.speed;
  ring3.rotation.x += 0.001 * cfg.speed;
  wireSphere.rotation.y += 0.002;
  wireSphere.rotation.x += 0.001;
  particles.rotation.y += 0.0008;

  // Pulse
  const pulse = appStatus === "speaking"
    ? 1 + Math.sin(t * 8) * 0.06 + speakAmplitude * 0.1
    : appStatus === "listening"
    ? 1 + Math.sin(t * 6) * 0.04
    : appStatus === "thinking"
    ? 1 + Math.sin(t * 4) * 0.03
    : 1 + Math.sin(t * 1.5) * 0.015;

  core.scale.setScalar(pulse);
  glowSphere.scale.setScalar(pulse * 1.05);

  // Glow opacity
  glowMat.opacity += (cfg.glow - glowMat.opacity) * 0.05;
  pMat.opacity += ((appStatus === "idle" ? 0.4 : 0.7) - pMat.opacity) * 0.03;

  // Ring opacity
  ring1.material.opacity += (cfg.ring * 0.5 - ring1.material.opacity) * 0.04;
  ring2.material.opacity += (cfg.ring * 0.3 - ring2.material.opacity) * 0.04;

  // Color shift on core emissive
  const targetColor = new THREE.Color(cfg.core);
  coreMat.emissive.lerp(targetColor, 0.03);
  pointLight1.color.lerp(targetColor, 0.03);

  renderer.render(scene, camera);
}
animate();

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── MEMORY ──
function loadMemory() { try { return JSON.parse(localStorage.getItem("jv_mem") || "[]"); } catch(e) { return []; } }
function saveMemoryList(l) { localStorage.setItem("jv_mem", JSON.stringify(l)); }
function saveMemory() {
  const inp = document.getElementById("mem-input");
  const t = inp.value.trim();
  if (!t) return;
  const l = loadMemory(); l.push({ id: Date.now(), text: t });
  saveMemoryList(l); inp.value = "";
  renderMemory();
}
function deleteMemory(id) { saveMemoryList(loadMemory().filter(m => m.id !== id)); renderMemory(); }
function clearMemory() { if (confirm("Cancellare tutta la memoria?")) { localStorage.removeItem("jv_mem"); renderMemory(); } }
function renderMemory() {
  const list = loadMemory();
  const el = document.getElementById("mem-list");
  if (list.length === 0) { el.innerHTML = '<div style="padding:16px;font-size:11px;color:rgba(0,212,255,0.3)">Nessuna memoria. Aggiungi informazioni su di te e il tuo business.</div>'; return; }
  el.innerHTML = "";
  list.forEach(m => {
    const d = document.createElement("div"); d.className = "mitem";
    d.innerHTML = `<span>${m.text}</span><button class="mdel" onclick="deleteMemory(${m.id})">✕</button>`;
    el.appendChild(d);
  });
}

// ── HISTORY ──
function loadHistory() { try { return JSON.parse(localStorage.getItem("jv_hist") || "[]"); } catch(e) { return []; } }
function saveHistory() { localStorage.setItem("jv_hist", JSON.stringify(history.slice(-60))); }

function buildSystem() {
  const mems = loadMemory();
  let mem = mems.length > 0 ? "\n\nCOSA SAI DEL SIGNORE:\n" + mems.map(m => "- " + m.text).join("\n") : "";
  return SYSTEM + mem;
}

// ── STATUS ──
function setStatus(s) {
  appStatus = s;
  const labels = { idle:"● IN ATTESA", thinking:"● ELABORAZIONE...", speaking:"● IN RISPOSTA", listening:"● IN ASCOLTO — PARLA ORA" };
  const colors = { idle:"#00d4ff", thinking:"#ffaa00", speaking:"#00ff88", listening:"#ff4488" };
  const c = colors[s];
  document.getElementById("status-text").textContent = labels[s];
  document.getElementById("status-text").style.color = c;
  document.getElementById("hud-status").textContent = "● " + labels[s].replace("● ","");
  document.getElementById("hud-status").style.color = c;
  const mb = document.getElementById("mic-btn");
  mb.className = s === "listening" ? "listening" : s === "speaking" ? "speaking" : s === "thinking" ? "thinking" : "";
}

// ── PANELS ──
function openPanel(name) {
  document.getElementById("chat-panel").classList.remove("open");
  document.getElementById("mem-panel").classList.remove("open");
  document.getElementById("mod-panel").classList.remove("open");
  document.getElementById(name + "-panel").classList.add("open");
  if (name === "mem") renderMemory();
}
function closePanel(name) { document.getElementById(name + "-panel").classList.remove("open"); }

// ── KEYBOARD TOGGLE ──
function toggleKeyboard() {
  showKeyboard = !showKeyboard;
  const row = document.getElementById("input-row");
  row.classList.toggle("visible", showKeyboard);
  if (showKeyboard) { document.getElementById("response-text").style.bottom = "200px"; document.getElementById("status-text").style.bottom = "170px"; }
  else { document.getElementById("response-text").style.bottom = "145px"; document.getElementById("status-text").style.bottom = "120px"; }
}

// ── RENDER CHAT MSG ──
function renderChatMsg(role, content) {
  const msgs = document.getElementById("chat-messages");
  const row = document.createElement("div"); row.className = "cmsg" + (role === "user" ? " user" : "");
  const av = document.createElement("div"); av.className = "cav " + (role === "assistant" ? "j" : "s");
  av.textContent = role === "assistant" ? "J" : "S";
  const bub = document.createElement("div"); bub.className = "cbub " + (role === "assistant" ? "j" : "s");
  if (role === "assistant") { const lbl = document.createElement("div"); lbl.className = "clbl"; lbl.textContent = "J.A.R.V.I.S."; bub.appendChild(lbl); }
  const txt = document.createElement("span"); txt.textContent = content;
  bub.appendChild(txt); row.appendChild(av); row.appendChild(bub);
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function showResponse(text) {
  const el = document.getElementById("response-text");
  // Show shortened version on main screen
  const short = text.length > 180 ? text.substring(0, 180) + "..." : text;
  el.textContent = short;
  el.classList.add("visible");
  setTimeout(() => el.classList.remove("visible"), 8000);
}

// ── SPEAK ──
async function speak(text) {
  setStatus("speaking");
  try {
    let vocal = text.replace(/\*\*/g,"").replace(/\*/g,"").replace(/#{1,3} /g,"").replace(/\n/g," ");
    if (vocal.length > 480) {
      const cut = vocal.substring(0, 480);
      const last = Math.max(cut.lastIndexOf("."), cut.lastIndexOf("!"), cut.lastIndexOf("?"));
      vocal = last > 80 ? cut.substring(0, last+1) : cut;
    }
    const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}`, {
      method: "POST",
      headers: { "xi-api-key": ELEVENLABS_KEY, "Content-Type": "application/json" },
      body: JSON.stringify({ text: vocal, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.45, similarity_boost: 0.88, style: 0.25, use_speaker_boost: true } })
    });
    if (!res.ok) { setStatus("idle"); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    currentAudio = new Audio(url);
    // Animate reactor with audio
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    const source = actx.createMediaElementSource(currentAudio);
    const analyser = actx.createAnalyser();
    analyser.fftSize = 32;
    source.connect(analyser);
    analyser.connect(actx.destination);
    const data = new Uint8Array(analyser.frequencyBinCount);
    function updateAmplitude() {
      if (appStatus !== "speaking") return;
      analyser.getByteFrequencyData(data);
      speakAmplitude = data.reduce((a,b) => a+b, 0) / data.length / 128;
      requestAnimationFrame(updateAmplitude);
    }
    updateAmplitude();
    currentAudio.onended = () => { setStatus("idle"); speakAmplitude = 0; URL.revokeObjectURL(url); };
    currentAudio.onerror = () => { setStatus("idle"); speakAmplitude = 0; };
    await currentAudio.play();
  } catch(e) { console.error("speak", e); setStatus("idle"); }
}

// ── SEND ──
async function send(text) {
  text = (text||"").trim();
  if (!text || appStatus === "thinking") return;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }

  document.getElementById("text-input").value = "";
  closePanel("mod");

  history.push({ role: "user", content: text });
  saveHistory();
  renderChatMsg("user", text);
  setStatus("thinking");

  try {
    const res = await fetch(PROXY_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1024, system: buildSystem(), messages: history.map(m => ({ role: m.role, content: m.content })) })
    });
    if (!res.ok) throw new Error("proxy " + res.status);
    const data = await res.json();
    const reply = data.content?.[0]?.text || "Richiesta non elaborata, Signore.";
    history.push({ role: "assistant", content: reply });
    saveHistory();
    renderChatMsg("assistant", reply);
    showResponse(reply);
    setStatus("idle");
    await speak(reply);
  } catch(e) {
    console.error(e);
    const err = "Connessione interrotta, Signore. Verifico i sistemi.";
    history.push({ role: "assistant", content: err });
    saveHistory();
    renderChatMsg("assistant", err);
    showResponse(err);
    setStatus("idle");
    await speak(err);
  }
}

function sendText() { send(document.getElementById("text-input").value); }
function quickSend(t) { closePanel("mod"); send(t); }

// ── MICROPHONE ──
function toggleMic() {
  if (appStatus === "thinking") return;
  if (appStatus === "listening") {
    if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
    setStatus("idle"); return;
  }
  if (appStatus === "speaking") { if (currentAudio) { currentAudio.pause(); currentAudio = null; } speakAmplitude = 0; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert("Riconoscimento vocale non supportato. Usa Chrome su Android o Safari su iPhone."); return; }
  recognition = new SR();
  recognition.lang = "it-IT";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;
  recognition.onstart = () => setStatus("listening");
  recognition.onresult = (e) => {
    const t = e.results[0]?.[0]?.transcript || "";
    recognition = null; setStatus("idle");
    if (t.trim()) send(t);
  };
  recognition.onerror = (e) => {
    recognition = null; setStatus("idle");
    if (e.error === "not-allowed") alert("Permesso microfono negato. Abilita il microfono nelle impostazioni di Chrome per questa pagina.");
    else if (e.error !== "no-speech") alert("Errore microfono: " + e.error);
  };
  recognition.onend = () => { recognition = null; if (appStatus === "listening") setStatus("idle"); };
  try { recognition.start(); } catch(e) { recognition = null; setStatus("idle"); }
}

// ── INIT ──
function init() {
  history = loadHistory();
  history.slice(-30).forEach(m => renderChatMsg(m.role, m.content));
  if (history.length > 0) {
    const last = history.filter(m => m.role === "assistant").slice(-1)[0];
    if (last) showResponse(last.content);
  }
  renderMemory();
}
init();
</script>
